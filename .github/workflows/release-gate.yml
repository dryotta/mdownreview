name: Release Gate

on:
  pull_request:
    branches: [main]

jobs:
  # ── Cross-platform tests (Linux, Windows, macOS) ─────────────────────────
  test:
    name: Test (${{ matrix.name }})
    if: startsWith(github.head_ref, 'release/')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Vitest unit tests
        run: npm test

      - name: Install Playwright (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E tests (browser mode)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.name }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ── Installer builds (Windows + macOS) ───────────────────────────────────
  build:
    name: Build (${{ matrix.name }})
    needs: test
    if: startsWith(github.head_ref, 'release/')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-x64
            rust_target: x86_64-pc-windows-msvc
            target_dir: src-tauri/target/release
            tauri_args: ""
          - os: macos-latest
            name: macos-arm64
            rust_target: aarch64-apple-darwin
            target_dir: src-tauri/target/release
            tauri_args: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Clean stale bundles from cache
        shell: bash
        run: rm -rf src-tauri/target/release/bundle src-tauri/target/*/release/bundle 2>/dev/null || true

      - name: Build Tauri app
        shell: bash
        run: |
          if [ -n "${{ matrix.tauri_args }}" ]; then
            npm run tauri:build -- ${{ matrix.tauri_args }}
          else
            npm run tauri:build
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  # ── Native E2E (Windows only — WebView2 supports CDP) ───────────────────
  native-e2e:
    name: Native E2E (Windows)
    needs: test
    if: startsWith(github.head_ref, 'release/')
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build debug binary for testing
        working-directory: src-tauri
        run: cargo build

      - name: Run native E2E tests
        run: npm run test:e2e:native

      - name: Upload native test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: native-playwright-report
          path: playwright-report/
          retention-days: 7
