name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.2)'
        required: true

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Get tag name
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
      - name: Create draft release
        run: |
          # Skip creation if release already exists (re-run scenario)
          gh release view "${{ steps.tag.outputs.tag }}" &>/dev/null || \
          gh release create "${{ steps.tag.outputs.tag }}" \
            --draft \
            --title "mdownreview ${{ steps.tag.outputs.tag }}" \
            --notes "## Install

          ### Script install (recommended)

          **macOS**
          \`\`\`
          curl -LsSf https://dryotta.github.io/mdownreview/install.sh | sh
          \`\`\`

          **Windows (PowerShell)**
          \`\`\`
          powershell -ExecutionPolicy ByPass -c \"irm https://dryotta.github.io/mdownreview/install.ps1 | iex\"
          \`\`\`

          > ⚠️ Pipes remote code into your shell — use the manual download below if blocked by security policy.

          ### Manual download

          Grab the installer for your platform from the Assets section below.

          **macOS only** — because the app is ad-hoc signed (not notarized), clear the quarantine attribute after first launch is blocked:
          \`\`\`
          xattr -dr com.apple.quarantine /Applications/mdownreview.app
          \`\`\`

          ### CLI only (Cargo)

          \`\`\`
          cargo install --git https://github.com/dryotta/mdownreview.git --bin mdownreview-cli
          \`\`\`

          ### Why is the app unsigned?

          See [docs/features/installation.md](https://github.com/dryotta/mdownreview/blob/main/docs/features/installation.md) for the rationale and security trade-offs."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-x64
            rust_target: x86_64-pc-windows-msvc
            target_dir: src-tauri/target/release
            tauri_args: ""
          - os: windows-latest
            name: windows-arm64
            rust_target: aarch64-pc-windows-msvc
            target_dir: src-tauri/target/aarch64-pc-windows-msvc/release
            tauri_args: "--target aarch64-pc-windows-msvc"
          - os: macos-latest
            name: macos-arm64
            rust_target: aarch64-apple-darwin
            target_dir: src-tauri/target/release
            tauri_args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Clean stale bundles from cache
        shell: bash
        run: rm -rf src-tauri/target/release/bundle src-tauri/target/*/release/bundle 2>/dev/null || true

      - name: Stage CLI binary (build + copy to externalBin path)
        shell: bash
        run: |
          if [ -n "${{ matrix.tauri_args }}" ]; then
            TARGET=$(echo "${{ matrix.tauri_args }}" | grep -oP '(?<=--target\s)\S+' || true)
            if [ -n "$TARGET" ]; then
              node scripts/stage-cli.mjs --release --target "$TARGET"
            else
              node scripts/stage-cli.mjs --release
            fi
          else
            node scripts/stage-cli.mjs --release
          fi

      - name: Build Tauri app
        shell: bash
        run: |
          if [ -n "${{ matrix.tauri_args }}" ]; then
            npm run tauri:build -- ${{ matrix.tauri_args }}
          else
            npm run tauri:build
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Verify ad-hoc signing (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP_PATH=$(ls -d src-tauri/target/release/bundle/macos/*.app src-tauri/target/*/release/bundle/macos/*.app 2>/dev/null | head -1)
          [ -n "$APP_PATH" ] || { echo "::error::No .app bundle found"; exit 1; }
          codesign -dv --verbose=4 "$APP_PATH" 2>&1 | tee codesign.log
          grep -q 'Signature=adhoc' codesign.log || { echo "::error::App is not ad-hoc signed"; exit 1; }
          codesign -dv --verbose=4 "$APP_PATH/Contents/MacOS/mdownreview-cli" 2>&1 | tee codesign-cli.log
          grep -q 'Signature=adhoc' codesign-cli.log || { echo "::error::Embedded CLI is not ad-hoc signed"; exit 1; }
          echo "✓ App and embedded CLI are ad-hoc signed"

      - name: Rename and upload artifacts
        shell: bash
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          VERSION="${TAG#v}"
          NAME="mdownreview-${VERSION}-${{ matrix.name }}"

          if [[ "${{ matrix.name }}" == windows-* ]]; then
            # Rename the NSIS zip (serves as both download and updater artifact)
            nsis_zip=$(ls -t ${{ matrix.target_dir }}/bundle/nsis/*.nsis.zip 2>/dev/null | head -1)
            [ -z "$nsis_zip" ] && { echo "::error::NSIS zip not found"; exit 1; }
            cp "$nsis_zip" "${NAME}.zip"
            gh release upload "$TAG" "${NAME}.zip" --clobber

            # Upload CLI binary
            cli_bin=$(find ${{ matrix.target_dir }} -maxdepth 1 -name "mdownreview-cli.exe" 2>/dev/null | head -1)
            if [ -n "$cli_bin" ]; then
              cp "$cli_bin" "mdownreview-cli-${VERSION}-${{ matrix.name }}.exe"
              gh release upload "$TAG" "mdownreview-cli-${VERSION}-${{ matrix.name }}.exe" --clobber
            fi

            # Upload the signature file with matching name
            sig="${nsis_zip}.sig"
            if [ -f "$sig" ]; then
              cp "$sig" "${NAME}.zip.sig"
              gh release upload "$TAG" "${NAME}.zip.sig" --clobber
            fi
          else
            # Rename the DMG for human download
            dmg=$(ls -t ${{ matrix.target_dir }}/bundle/dmg/*.dmg 2>/dev/null | head -1)
            [ -z "$dmg" ] && { echo "::error::DMG not found"; exit 1; }
            cp "$dmg" "${NAME}.dmg"
            gh release upload "$TAG" "${NAME}.dmg" --clobber

            # Upload CLI binary
            cli_bin=$(find ${{ matrix.target_dir }} -maxdepth 1 -name "mdownreview-cli" 2>/dev/null | head -1)
            if [ -n "$cli_bin" ]; then
              cp "$cli_bin" "mdownreview-cli-${VERSION}-${{ matrix.name }}"
              gh release upload "$TAG" "mdownreview-cli-${VERSION}-${{ matrix.name }}" --clobber
            fi

            # Rename the .app.tar.gz updater bundle
            app_tar=$(ls -t ${{ matrix.target_dir }}/bundle/macos/*.app.tar.gz 2>/dev/null | head -1)
            if [ -n "$app_tar" ]; then
              cp "$app_tar" "${NAME}.app.tar.gz"
              gh release upload "$TAG" "${NAME}.app.tar.gz" --clobber
              sig="${app_tar}.sig"
              if [ -f "$sig" ]; then
                cp "$sig" "${NAME}.app.tar.gz.sig"
                gh release upload "$TAG" "${NAME}.app.tar.gz.sig" --clobber
              fi
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Native E2E tests run in release-gate.yml before merge.
  # They require WebView2 + CDP on a Windows runner (debug binary).

  publish-update-manifest:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and upload latest.json
        shell: bash
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/dryotta/mdownreview/releases/download/${TAG}"
          NAME="mdownreview-${VERSION}"

          mkdir -p /tmp/sigs

          # Read signature file content from a release asset
          read_sig() {
            local asset_name="$1"
            gh release download "$TAG" --pattern "${asset_name}" --dir /tmp/sigs 2>/dev/null || true
            cat "/tmp/sigs/${asset_name}" 2>/dev/null || echo ""
          }

          # Verify all required updater assets exist before generating manifest
          for asset in "${NAME}-windows-x64.zip" "${NAME}-windows-arm64.zip" "${NAME}-macos-arm64.app.tar.gz"; do
            gh release view "$TAG" --json assets --jq ".assets[].name" | grep -q "^${asset}$" || \
              { echo "::error::Required updater asset not found: $asset"; exit 1; }
          done

          WIN_X64_SIG=$(read_sig "${NAME}-windows-x64.zip.sig")
          WIN_ARM64_SIG=$(read_sig "${NAME}-windows-arm64.zip.sig")
          MAC_ARM64_SIG=$(read_sig "${NAME}-macos-arm64.app.tar.gz.sig")

          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > /tmp/latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "See release notes on GitHub.",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${WIN_X64_SIG}",
                "url": "${BASE_URL}/${NAME}-windows-x64.zip"
              },
              "windows-aarch64": {
                "signature": "${WIN_ARM64_SIG}",
                "url": "${BASE_URL}/${NAME}-windows-arm64.zip"
              },
              "darwin-aarch64": {
                "signature": "${MAC_ARM64_SIG}",
                "url": "${BASE_URL}/${NAME}-macos-arm64.app.tar.gz"
              }
            }
          }
          EOF

          gh release upload "$TAG" /tmp/latest.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    needs: [create-release, build, publish-update-manifest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish release
        run: gh release edit "${{ needs.create-release.outputs.tag }}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
