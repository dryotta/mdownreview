name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'e2e/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'tsconfig*'
      - 'vitest.config.*'
      - 'playwright.config.*'
      - 'eslint.config.*'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'e2e/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'tsconfig*'
      - 'vitest.config.*'
      - 'playwright.config.*'
      - 'eslint.config.*'
      - '.github/workflows/ci.yml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Tests (Linux) ────────────────────────────────────────────────────────
  # Runs in parallel with the build matrix — no "needs" dependency.
  test:
    name: Test (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Cache Linux system dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          version: 1.0

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Vitest unit tests
        run: npm test

      - name: Install Playwright (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E tests (browser mode)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ── Installer builds (Windows + macOS) ───────────────────────────────────
  # Runs after tests pass to avoid wasting build minutes on test failures.
  build:
    name: Build (${{ matrix.name }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-x64
            rust_target: x86_64-pc-windows-msvc
            target_dir: src-tauri/target/release
            tauri_args: ""
            artifact_ext: zip

          - os: windows-latest
            name: windows-arm64
            rust_target: aarch64-pc-windows-msvc
            target_dir: src-tauri/target/aarch64-pc-windows-msvc/release
            tauri_args: "--target aarch64-pc-windows-msvc"
            artifact_ext: zip

          - os: macos-latest
            name: macos-arm64
            rust_target: aarch64-apple-darwin
            target_dir: src-tauri/target/release
            tauri_args: ""
            artifact_ext: dmg

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Clean stale bundles from cache
        shell: bash
        run: rm -rf src-tauri/target/release/bundle src-tauri/target/*/release/bundle 2>/dev/null || true

      - name: Build Tauri app
        shell: bash
        run: |
          if [ -n "${{ matrix.tauri_args }}" ]; then
            npm run tauri:build -- ${{ matrix.tauri_args }}
          else
            npm run tauri:build
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Package artifact
        shell: bash
        run: |
          NAME="mdownreview-${{ matrix.name }}"
          if [[ "${{ matrix.artifact_ext }}" == "zip" ]]; then
            nsis_zip=$(ls -t ${{ matrix.target_dir }}/bundle/nsis/*.nsis.zip 2>/dev/null | head -1)
            [ -z "$nsis_zip" ] && { echo "::error::NSIS zip not found"; exit 1; }
            cp "$nsis_zip" "${NAME}.zip"
            echo "ARTIFACT=${NAME}.zip" >> "$GITHUB_ENV"
          else
            dmg=$(ls -t ${{ matrix.target_dir }}/bundle/dmg/*.dmg 2>/dev/null | head -1)
            [ -z "$dmg" ] && { echo "::error::DMG not found"; exit 1; }
            cp "$dmg" "${NAME}.dmg"
            echo "ARTIFACT=${NAME}.dmg" >> "$GITHUB_ENV"
          fi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.ARTIFACT }}
          retention-days: 14
